<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>루나</title>

  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="루나" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.22), transparent 34%),
        linear-gradient(180deg, #0f172a 0%, #111827 100%);
    }

    #header {
      padding: calc(env(safe-area-inset-top) + 16px) 18px 14px;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 13px;
      flex-shrink: 0;
    }

    #avatar {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: radial-gradient(circle at 30% 25%, #f5d0fe, #a78bfa 45%, #4c1d95);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 24px rgba(167, 139, 250, 0.45);
    }

    #titleBox {
      flex: 1;
      min-width: 0;
    }

    #title {
      font-size: 21px;
      font-weight: 850;
      letter-spacing: -0.5px;
    }

    #status {
      margin-top: 3px;
      font-size: 13px;
      color: #cbd5e1;
    }

    #status::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.7);
      vertical-align: 1px;
    }

    #chatWrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #chat {
      height: 100%;
      overflow-y: auto;
      padding: 18px 13px 112px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .row {
      display: flex;
      width: 100%;
      animation: pop 0.16s ease-out;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(4px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.luna {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(82%, 520px);
      padding: 11px 14px;
      border-radius: 19px;
      font-size: 15.8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }

    .user .bubble {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #031521;
      border-bottom-right-radius: 6px;
    }

    .luna .bubble {
      background: linear-gradient(135deg, #c4b5fd, #a78bfa);
      color: #170f2e;
      border-bottom-left-radius: 6px;
    }

    .typing .bubble {
      opacity: 0.85;
      animation: pulse 1.05s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.45; }
      50% { opacity: 1; }
      100% { opacity: 0.45; }
    }

    #inputArea {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      min-height: 64px;
      padding: 8px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.35);
    }

    #msg {
      flex: 1;
      height: 48px;
      min-width: 0;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 0 14px;
      background: rgba(15, 23, 42, 0.95);
      color: white;
      font-size: 16px;
    }

    #msg::placeholder {
      color: #94a3b8;
    }

    button {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 18px;
      color: white;
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 7px 18px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.95);
    }

    #micBtn {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
    }

    #sendBtn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }

    #emptyHint {
      margin: auto;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
      padding-top: 80px;
    }
  </style>
</head>

<body>
  <div id="header">
    <div id="avatar">🌙</div>
    <div id="titleBox">
      <div id="title">루나</div>
      <div id="status">대기 중</div>
    </div>
  </div>

  <div id="chatWrap">
    <div id="chat">
      <div id="emptyHint">
        안녕, 나는 루나야.<br />
        말하거나 입력하면 바로 도와줄게.
      </div>
    </div>
  </div>

  <div id="inputArea">
    <button id="micBtn" onclick="startVoice()">🎤</button>
    <input id="msg" placeholder="루나에게 말해봐..." />
    <button id="sendBtn" onclick="send()">➤</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const statusText = document.getElementById("status");
    const input = document.getElementById("msg");
    const emptyHint = document.getElementById("emptyHint");

    function setStatus(text) {
      statusText.innerText = text;
    }

    function removeEmptyHint() {
      if (emptyHint && emptyHint.parentNode) {
        emptyHint.parentNode.removeChild(emptyHint);
      }
    }

    function addMessage(text, sender, extraClass = "") {
      removeEmptyHint();

      const row = document.createElement("div");
      row.className = "row " + sender + (extraClass ? " " + extraClass : "");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = text;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;

      return row;
    }

    function removeElement(el) {
      if (el && el.parentNode) {
        el.parentNode.removeChild(el);
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      setStatus("생각 중...");
      const thinking = addMessage("생각 중...", "luna", "typing");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        removeElement(thinking);

        const reply = data.reply || "응답이 비어 있어.";
        addMessage(reply, "luna");
        setStatus("대기 중");

      } catch (err) {
        removeElement(thinking);
        addMessage("서버 연결 오류가 났어. 잠깐 뒤에 다시 말해줘.", "luna");
        setStatus("오류");
      }
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        send();
      }
    });

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        addMessage("이 브라우저는 음성 인식을 지원하지 않아.", "luna");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.interimResults = false;
      recognition.continuous = false;

      setStatus("듣는 중...");

      recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;
        input.value = text;
        send();
      };

      recognition.onerror = function() {
        setStatus("대기 중");
        addMessage("음성을 잘 못 들었어. 다시 말해줘.", "luna");
      };

      recognition.onend = function() {
        if (statusText.innerText === "듣는 중...") {
          setStatus("대기 중");
        }
      };

      recognition.start();
    }
  </script>
</body>
</html>
