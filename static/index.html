<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <div id="header">🌙 루나</div>
  <title>루나</title>
  <style>
  body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #header {
    padding: 12px;
    background: #1e293b;
    text-align: center;
    font-weight: bold;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .msg {
    max-width: 70%;
    margin: 6px;
    padding: 10px;
    border-radius: 12px;
  }

  .user {
    background: #38bdf8;
    align-self: flex-end;
    color: black;
  }

  .luna {
    background: #a78bfa;
    align-self: flex-start;
    color: black;
  }

  #inputArea {
    display: flex;
    padding: 10px;
    background: #1e293b;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  button {
    margin-left: 8px;
    padding: 10px;
    background: #6366f1;
    border: none;
    color: white;
    border-radius: 8px;
  }
  </style>
</head>
<body>

<div id="chat" style="display:flex; flex-direction:column;"></div>

<div id="inputArea">
  <input id="msg" placeholder="루나에게 말해봐..." />
  <button onclick="send()">전송</button>
</div>

<script>
const chat = document.getElementById("chat");

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  add("나: " + text, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("루나: " + (data.reply || "응답 없음"), "luna");;
}
</script>

</body>
</html>
