<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>루나</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }
    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }
    .msg {
      margin: 8px 0;
    }
    .user { color: #38bdf8; }
    .luna { color: #a78bfa; }

    #inputArea {
      display: flex;
      border-top: 1px solid #333;
    }
    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }
    button {
      padding: 10px;
      background: #6366f1;
      border: none;
      color: white;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="루나에게 말해봐..." />
  <button onclick="send()">전송</button>
</div>

<script>
const chat = document.getElementById("chat");

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  add("나: " + text, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("루나: " + (data.reply || "응답 없음"), "luna");;
}
</script>

</body>
</html>
