<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Record Voice</title>
    <link rel="stylesheet" href="recorder.css" type="text/css" />
    <link rel="stylesheet" href="../styles.css" type="text/css" />
    <link rel="shortcut icon" type="image/png" href="../img/icon-16.png" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <script src="lame.min.js"></script>
</head>
<body id="page">
<div class="recorder">
    <div class="img-logo text-center">
        <a href="https://cws.tools/chrome-audio-capture" target="_blank">
            <img src="../img/logo.svg" class="" />
        </a>
    </div>
    <h1 class="page-title">Voice Recorder</h1>
    <h2>Record and save audio from the microphone.</h2>

    <a
        class="btn btn-action recorder-btn"
        href="#"
        id="btn-record"
        title="Start recording"
    >
        <p>Start Recording</p>
        <div class="icon">
            <svg
                aria-hidden="true"
                width="18"
                height="18"
                focusable="false"
                data-prefix="fas"
                data-icon="microphone"
                class="svg-inline--fa fa-microphone fa-w-11"
                role="img"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 352 512"
            >
                <path
                    fill="currentColor"
                    d="M176 352c53.02 0 96-42.98 96-96V96c0-53.02-42.98-96-96-96S80 42.98 80 96v160c0 53.02 42.98 96 96 96zm160-160h-16c-8.84 0-16 7.16-16 16v48c0 74.8-64.49 134.82-140.79 127.38C96.71 376.89 48 317.11 48 250.3V208c0-8.84-7.16-16-16-16H16c-8.84 0-16 7.16-16 16v40.16c0 89.64 63.97 169.55 152 181.69V464H96c-8.84 0-16 7.16-16 16v16c0 8.84 7.16 16 16 16h160c8.84 0 16-7.16 16-16v-16c0-8.84-7.16-16-16-16h-56v-33.77C285.71 418.47 352 344.9 352 256v-48c0-8.84-7.16-16-16-16z"
                ></path>
            </svg>
        </div>
    </a>

    <a
        class="btn btn-action recorder-btn"
        href="#"
        id="btn-stop"
        title="Stop recording"
    >
        <p>Stop Recording</p>
        <div class="icon capture">
            <svg
                aria-hidden="true"
                width="18"
                height="18"
                focusable="false"
                data-prefix="fas"
                data-icon="stop"
                class="svg-inline--fa fa-stop fa-w-14"
                role="img"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 448 512"
            >
                <path
                    fill="currentColor"
                    d="M400 32H48C21.5 32 0 53.5 0 80v352c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48z"
                ></path>
            </svg>
        </div>
    </a>

    <a
        class="btn btn-inactive btn-action recorder-btn"
        href="#"
        id="btn-play"
        title="Play recorded audio"
    >
        <p>Play Audio</p>
        <div class="icon">
            <svg
                aria-hidden="true"
                width="18"
                height="18"
                focusable="false"
                data-prefix="fas"
                data-icon="play"
                class="svg-inline--fa fa-play fa-w-14"
                role="img"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 390 512"
            >
                <path
                    fill="currentColor"
                    d="M424.4 214.7L72.4 6.6C43.8-10.3 0 6.1 0 47.9V464c0 37.5 40.7 60.1 72.4 41.3l352-208c31.4-18.5 31.5-64.1 0-82.6z"
                ></path>
            </svg>
        </div>
    </a>

    <a
        class="btn btn-action recorder-btn"
        href="#"
        id="btn-pause"
        title="Pause"
    >
        <p>Pause</p>
        <div class="icon capture">
            <svg
                aria-hidden="true"
                width="18"
                height="18"
                focusable="false"
                data-prefix="fas"
                data-icon="pause"
                class="svg-inline--fa fa-pause fa-w-14"
                role="img"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 448 512"
            >
                <path
                    fill="currentColor"
                    d="M144 479H48c-26.5 0-48-21.5-48-48V79c0-26.5 21.5-48 48-48h96c26.5 0 48 21.5 48 48v352c0 26.5-21.5 48-48 48zm304-48V79c0-26.5-21.5-48-48-48h-96c-26.5 0-48 21.5-48 48v352c0 26.5 21.5 48 48 48h96c26.5 0 48-21.5 48-48z"
                ></path>
            </svg>
        </div>
    </a>

    <a
        class="btn btn-inactive btn-action recorder-btn"
        href="#"
        id="download-link"
        title="Download audio"
        download
    >
        <p>Download Audio</p>
        <div class="icon">
            <svg
                aria-hidden="true"
                width="18"
                height="18"
                focusable="false"
                data-prefix="fas"
                data-icon="download"
                class="svg-inline--fa fa-download fa-w-16"
                role="img"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 512 512"
            >
                <path
                    fill="currentColor"
                    d="M216 0h80c13.3 0 24 10.7 24 24v168h87.7c17.8 0 26.7 21.5 14.1 34.1L269.7 378.3c-7.5 7.5-19.8 7.5-27.3 0L90.1 226.1c-12.6-12.6-3.7-34.1 14.1-34.1H192V24c0-13.3 10.7-24 24-24zm296 376v112c0 13.3-10.7 24-24 24H24c-13.3 0-24-10.7-24-24V376c0-13.3 10.7-24 24-24h146.7l49 49c20.1 20.1 52.5 20.1 72.6 0l49-49H488c13.3 0 24 10.7 24 24zm-124 88c0-11-9-20-20-20s-20 9-20 20 9 20 20 20 20-9 20-20zm64 0c0-11-9-20-20-20s-20 9-20 20 9 20 20 20 20-9 20-20z"
                ></path>
            </svg>
        </div>
    </a>
    <div class="visualizer">
        <svg
            preserveAspectRatio="none"
            id="visualizer"
            version="1.1"
            xmlns="http://www.w3.org/2000/svg"
        >
            <defs>
                <mask id="mask">
                    <g id="maskGroup"></g>
                </mask>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color: #ff0a0a; stop-opacity: 1" />
                    <stop offset="20%" style="stop-color: #f1ff0a; stop-opacity: 1" />
                    <stop offset="90%" style="stop-color: #ffb300; stop-opacity: 1" />
                    <stop
                        offset="100%"
                        style="stop-color: #ff73eb; stop-opacity: 1"
                    />
                </linearGradient>
            </defs>
            <rect
                x="0"
                y="0"
                width="100%"
                height="100%"
                fill="url(#gradient)"
                mask="url(#mask)"
            ></rect>
        </svg>
    </div>
</div>
<script src="recorder.js"></script>
</body>
</html>
